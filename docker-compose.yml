version: "3.9"

# ============================================================
# SOFTCOINP — ORQUESTACIÓN MULTI-TENANT (DOCKER)
# ============================================================

services:

  # ──────────────────────────────────────────
  # Base de datos MySQL
  # ──────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: mysql-softcoinp
    command: --default-authentication-plugin=mysql_native_password
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "1234"
      # Base de datos maestra (catálogo de tenants)
      MYSQL_DATABASE: softcoinp_master
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - softcoinp-network
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost", "-u", "root", "-p1234"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ──────────────────────────────────────────
  # Backend — .NET 8 Multi-tenant
  # ──────────────────────────────────────────
  backend:
    build:
      context: ./Softcoinp.Backend
      dockerfile: Dockerfile.dev
    container_name: backend-softcoinp
    restart: unless-stopped
    ports:
      - "5100:8080"
    environment:
      # Conexión a la base de datos maestra
      - ConnectionStrings__MasterConnection=Server=db;Database=softcoinp_master;User=root;Password=1234
      # Conexión por defecto (usada como template o fallback)
      - ConnectionStrings__DefaultConnection=Server=db;Database=softcoinp_dev;User=root;Password=1234
      - BREVO_API_KEY=${BREVO_API_KEY}
      - ASPNETCORE_ENVIRONMENT=Development
      - DOTNET_USE_POLLING_FILE_WATCHER=1
      - DOTNET_WATCH_SUPPRESS_BROWSER_REFRESH=1
    volumes:
      - ./Softcoinp.Backend:/app
      - backend-obj:/app/obj
      - backend-bin:/app/bin
    depends_on:
      db:
        condition: service_healthy
    networks:
      - softcoinp-network

  # ──────────────────────────────────────────
  # Frontend — Next.js Multi-tenant
  # ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend-softcoinp
      dockerfile: Dockerfile.dev
    container_name: frontend-softcoinp
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # La URL base debe ser accesible desde el navegador del usuario
      - NEXT_PUBLIC_API_URL=http://localhost:5100/api
      - INTERNAL_API_URL=http://backend:8080/api
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      - NODE_OPTIONS=--max-old-space-size=2048
    volumes:
      - ./frontend-softcoinp:/app
      - frontend-node-modules-v3:/app/node_modules
      - frontend-next-cache-v3:/app/.next
    depends_on:
      - backend
    networks:
      - softcoinp-network

  # ──────────────────────────────────────────
  # phpMyAdmin
  # ──────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin-softcoinp
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      - PMA_ARBITRARY=1
      - PMA_HOST=db
      - PMA_USER=root
      - PMA_PASSWORD=1234
    depends_on:
      db:
        condition: service_healthy
    networks:
      - softcoinp-network

networks:
  softcoinp-network:
    driver: bridge

volumes:
  db-data:
  backend-obj:
  backend-bin:
  # Incrementamos versiones de volúmenes para asegurar limpieza tras cambios estructurales
  frontend-node-modules-v3:
  frontend-next-cache-v3:
